name: Build & publish site

on:
  push:
    branches:
      - main
      - claude/new-page-creation-7ejexm
  workflow_dispatch:

# Publishing to the gh-pages branch only needs contents:write — no Pages API,
# so this never fails on "Pages not enabled".
permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # Relative base + HashRouter => host-agnostic static bundle.
          VITE_SUPABASE_URL: https://hynoggphywmespnsvhro.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_ssVhLL2pzlZI_eTrIGsIBA_2midRYQ_

      - run: touch dist/.nojekyll

      # Publish the build to the gh-pages branch. Serve it via GitHub Pages
      # (Settings -> Pages -> Deploy from a branch -> gh-pages /root) for the
      # amallc-coder.github.io/billing/ URL.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
